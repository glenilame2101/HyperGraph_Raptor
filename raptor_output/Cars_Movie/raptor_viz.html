ixar's most lucrative franchises, generating billions in merchandise revenue. The film spawned two sequels -- *Cars 2* (2011) and *Cars 3* (2017) -- as well as spin-off films (*Planes*, 2013), short films, theme park attractions (Cars Land at Disney California Adventure), and an extensive toy line.", "token_count": 77}, {"id": "raptor_L0_0029", "level": 0, "type": "leaf", "name": "The film was the last project that **Joe Ranft**, Pixar's beloved head of story, worked on before his death in a car accident in 2005. The film is dedicated to his memory. *Cars* holds a special place...", "full_text": "The film was the last project that **Joe Ranft**, Pixar's beloved head of story, worked on before his death in a car accident in 2005. The film is dedicated to his memory. *Cars* holds a special place in Pixar's filmography as director John Lasseter's deeply personal love letter to Route 66, classic American car culture, and the small towns that time forgot.", "token_count": 82}, {"id": "raptor_L1_0000", "level": 1, "type": "summary", "name": "At the final Piston Cup race at the Motor Speedway of the South, retiring legend Strip “The King” Weathers, perennial runner-up Chick Hicks, and brash rookie Lightning McQueen finish in an unprecedent...", "full_text": "At the final Piston Cup race at the Motor Speedway of the South, retiring legend Strip “The King” Weathers, perennial runner-up Chick Hicks, and brash rookie Lightning McQueen finish in an unprecedented three-way tie, setting a tiebreaker for one week later at the Los Angeles International Speedway; arrogant and self-centered, Lightning wants the championship to secure the prestigious Dinoco sponsorship replacing the retiring King, pressures his transport truck Mack to drive overnight, and after reckless street racers Boost, DJ, Wingo, and Snot Rod startle Mack, tumbles from the trailer, gets lost, and tears through Radiator Springs on Route 66, destroying its main road. Apprehended by Sheriff and brought before Judge Doc Hudson, Lightning is nearly kicked out until Sally Carrera—a Porsche 911, the town attorney, who left her fast-paced Los Angeles life for a simpler one in Radiator Springs and becomes Lightning’s love interest—argues he should repair the damage; sentenced to repave the road with Bessie, he botches it by rushing, then loses a wager race against Doc at Willy’s Butte when Doc expertly handles a sharp dirt-track turn and Lightning crashes into a cactus patch, forcing him to start over. As he remains in town, Lightning learns Radiator Springs was once a thriving Route 66 stop before Interstate 40 bypassed it; he is befriended by Mater, a rusty but lovable tow truck who becomes his best friend, goes tractor tipping, hears Sally explain how the Interstate took the magic out of the journey, receives a new paint job from Ramone, new tires from Luigi and Guido, stops at Flo’s V8 Cafe, and helps revive the town’s spirit by cruising the main drag and lighting its neon, while Doc stays cold, insisting the racing world is hollow and will chew racers up and spit them out. Lightning gradually learns humility, friendship, community, and that the journey matters more than the destination, changing from a selfish loner who says “I’m a one-man show” and boasts, “I’m a precision instrument of speed and aerodynamics” and “I create feelings in others that they themselves don’t understand,” into someone who genuinely cares about others; Doc’s bitterness reflects legacy, abandonment, and redemption after his own devastating crash, encapsulated in “Turn right to go left” and “These are good folk around here, who care about one another. I don’t want them depending on someone they can’t count on,” while Sally later says, “It was the town that got to him. They changed him.” Just as Lightning finishes the road and bonds with the town, Doc—hoping to get him out of their lives—alerts the media, Mack arrives, and Lightning is whisked to California before saying goodbye; realizing his mistake, Doc appears at the tiebreaker as Lightning’s crew chief in his old Fabulous Hudson Hornet colors, with Mater, Luigi, Guido, Sarge, Fillmore, Ramone, Flo, Sheriff, and Red serving as pit crew, where Guido performs a real pit stop in record time. Distracted at first, Lightning rallies, but on the final lap Chick deliberately rams The King into a horrific crash mirroring Doc’s wreck decades earlier; inches from winning, Lightning slams on his brakes, lets Chick take the Piston Cup, then reverses to push The King across the finish line so he can complete his last race with dignity, demonstrating humility and sportsmanship as Chick is booed for his hollow victory. In the epilogue, Lightning turns down Dinoco, remains loyal to Rust-eze because they believed in him when no one else did, asks Dinoco’s owner for one favor—a helicopter ride Mater has always dreamed of (“I’m happier than a tornado in a trailer park!”)—and establishes his racing headquarters in Radiator Springs, reviving tourism and businesses; Lightning and Sally begin a relationship, Doc and Lightning both find redemption, and Lightning discovers a home, real friends, and values more important than any trophy.", "token_count": 828}, {"id": "raptor_L1_0001", "level": 1, "type": "summary", "name": "Cars is a 2006 animated comedy-adventure from Pixar Animation Studios and Walt Disney Pictures, directed by John Lasseter, co-directed by Joe Ranft, written by Dan Fogelman, John Lasseter, Joe Ranft, ...", "full_text": "Cars is a 2006 animated comedy-adventure from Pixar Animation Studios and Walt Disney Pictures, directed by John Lasseter, co-directed by Joe Ranft, written by Dan Fogelman, John Lasseter, Joe Ranft, Kiel Murray, Phil Lorin, and Jorgen Klubien, released June 9, 2006, with a runtime of 117 minutes. It centers on hotshot rookie race car Lightning McQueen, #95, sponsored by Rust-eze, alongside Radiator Springs residents including Doc Hudson, a 1951 Hudson Hornet who serves as town judge and doctor and is secretly the Fabulous Hudson Hornet, a legendary three-time Piston Cup champion; Sheriff, a 1949 Mercury Police Cruiser; Ramone, a 1959 Chevrolet Impala Lowrider who runs the body art shop and repaints himself daily; Flo, a 1950s show car who runs Flo's V8 Cafe, the local gas station and diner, and is Ramone's wife; Luigi, a yellow Fiat 500 who runs Luigi's Casa Della Tires and loves Ferrari; Guido, Luigi's small forklift assistant who dreams of performing a real pit stop; Sarge, a 1941 Willys military jeep who runs a surplus store and bickers with Fillmore; Fillmore, a 1960 VW Bus who sells organic fuel; Red, the shy fire truck; Lizzie, a 1923 Ford Model T, oldest resident and widow of founder Stanley; Chick Hicks, a ruthless rival and 1979 Shyster Cremlin stock car, #86; The King, or Strip Weathers, a retiring veteran champion and 1970 Plymouth Superbird, #43, modeled after Richard Petty; and Mack, Lightning’s loyal transport truck. While exploring Doc’s garage, Lightning finds three Piston Cup trophies and a newspaper clipping revealing Doc’s 1950s fame and that after a terrible crash he recovered only to find racing had moved on, leaving him replaced, forgotten, and bitter toward the sport. Notable lines include Doc’s “I didn't know you couldn't read.” and “There's a lot more to racing than just winning,” and Lightning’s “Float like a Cadillac, sting like a Beemer.” Soundtrack highlights are “Real Gone” by Sheryl Crow for the opening racing sequence, “Life Is a Highway” by Rascal Flatts for Lightning’s road trip montage, “Our Town” by James Taylor for Radiator Springs’ melancholy history, which was nominated for the Academy Award for Best Original Song, “Behind the Clouds” by Brad Paisley in the end credits, and “Route 66” by Chuck Berry. The film grossed over $460 million worldwide, launched one of Pixar’s most lucrative franchises with billions in merchandise revenue, and spawned Cars 2 (2011), Cars 3 (2017), spin-off films including Planes (2013), short films, theme park attractions including Cars Land at Disney California Adventure, and an extensive toy line. It was the last project worked on by Pixar head of story Joe Ranft before his death in a car accident in 2005, is dedicated to his memory, and holds a special place in Pixar’s filmography as John Lasseter’s personal love letter to Route 66, classic American car culture, and forgotten small towns.", "token_count": 691}], "links": [{"source": "raptor_L1_0000", "target": "raptor_L0_0001", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0006", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0007", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0008", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0009", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0010", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0011", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0012", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0014", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0015", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0016", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0017", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0018", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0019", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0020", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0021", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0022", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0023", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0024", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0025", "weight": 1.0}, {"source": "raptor_L1_0000", "target": "raptor_L0_0026", "weight": 1.0}, {"source": "raptor_L1_0001", "t     const OVERLAY= {"retrieved_node_ids": [], "scores": []};
    const MAX_LVL= 1;

    /* ====== PALETTE ====== */
    const LEVEL_COLORS = [
      "#3b82f6","#10b981","#f59e0b","#ef4444","#a855f7",
      "#ec4899","#06b6d4","#84cc16","#f97316","#6366f1"
    ];
    function lvlColor(lvl){ return LEVEL_COLORS[lvl % LEVEL_COLORS.length]; }

    /* ====== SETUP ====== */
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select("#svg").attr("viewBox",[0,0,W,H]);
    const gMain = svg.append("g");

    // zoom
    const zoom = d3.zoom().scaleExtent([0.05,8]).on("zoom", e => gMain.attr("transform",e.transform));
    svg.call(zoom);

    // layers
    const gLinks = gMain.append("g").attr("class","links-layer");
    const gNodes = gMain.append("g").attr("class","nodes-layer");
    const gLabels= gMain.append("g").attr("class","labels-layer");

    /* ====== POPULATE CONTROLS ====== */
    const levelSel = document.getElementById("levelFilter");
    for(let l=0;l<=MAX_LVL;l++){
      const o=document.createElement("option");
      o.value=l; o.textContent=`Level ${l} (${l===0?"leaves":"summaries"})`;
      levelSel.appendChild(o);
    }

    // legend
    const legendBox = document.getElementById("legendBox");
    for(let l=0;l<=MAX_LVL;l++){
      legendBox.innerHTML += `<div><span class="dot" style="background:${lvlColor(l)}"></span>L${l}</div>`;
    }

    /* ====== OVERLAY SET ====== */
    const overlaySet = new Set(OVERLAY.retrieved_node_ids||[]);
    const overlayScores = {};
    (OVERLAY.retrieved_node_ids||[]).forEach((id,i) => {
      overlayScores[id] = (OVERLAY.scores||[])[i] || 0;
    });

    /* ====== STATE ====== */
    let currentView = "dag"; // "dag" | "tree"
    let sim; // d3 force simulation

    /* ====== DAG VIEW ====== */
    function renderDAG(){
      gLinks.selectAll("*").remove();
      gNodes.selectAll("*").remove();
      gLabels.selectAll("*").remove();

      const nodeData = DAG.nodes.map(d => ({...d}));
      const nodeMap  = {};
      nodeData.forEach(d => nodeMap[d.id]=d);

      const linkData = DAG.links.map(d => ({...d}));

      // token_count → radius
      const maxTok = d3.max(nodeData, d=>d.token_count)||1;
      const rScale = d3.scaleSqrt().domain([0,maxTok]).range([5,22]);

      // force sim
      const layerSpacing = H / (MAX_LVL + 3);
      sim = d3.forceSimulation(nodeData)
        .force("link", d3.forceLink(linkData).id(d=>d.id).distance(80).strength(d=>d.weight*0.25))
        .force("charge", d3.forceManyBody().strength(-180))
        .force("y", d3.forceY(d => (MAX_LVL - d.level + 1) * layerSpacing).strength(0.35))
        .force("x", d3.forceX(W/2).strength(0.04))
        .force("collision", d3.forceCollide(d => rScale(d.token_count)+4));

      // links
      const linkSel = gLinks.selectAll("line").data(linkData).enter().append("line")
        .attr("class","link")
        .attr("stroke","#475569")
        .attr("stroke-opacity", d => 0.15 + d.weight*0.7)
        .attr("stroke-width", d => 0.5 + d.weight*3);

      // nodes
      const nodeSel = gNodes.selectAll("g.node").data(nodeData).enter().append("g").attr("class","node");

      nodeSel.each(function(d){
        const g = d3.select(this);
        const r = rScale(d.token_count);
        if(d.type==="leaf"){
          g.append("circle").attr("r",r).attr("fill",lvlColor(d.level)).attr("stroke","#0f172a").attr("stroke-width",1.5);
        } else {
          // diamond for summary nodes
          const s = r*1.3;
          g.append("rect").attr("x",-s).attr("y",-s).attr("width",s*2).attr("height",s*2)
           .attr("transform","rotate(45)").attr("rx",3)
           .attr("fill",lvlColor(d.level)).attr("stroke","#0f172a").attr("stroke-width",1.5);
        }
        // overlay glow
        if(overlaySet.has(d.id)){
          g.append("circle").attr("r",r+6).attr("fill","none")
           .attr("stroke","#fbbf24").attr("stroke-width",3).attr("stroke-dasharray","4,2");
        }
      });

      nodeSel.style("cursor","pointer")
        .on("mouseover", (e,d) => showDetail(d))
        .on("mouseout", clearDetail)
        .call(d3.drag()
          .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
          .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
          .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

      // labels
      const labelSel = gLabels.selectAll("text").data(nodeData).enter().append("text")
        .attr("class","node-label").attr("text-anchor","middle").attr("dy","0.35em")
        .text(d => d.name.slice(0,30) + (d.name.length>30?"...":""));

      sim.on("tick",()=>{
        linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
               .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
        nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
        labelSel.attr("x",d=>d.x).attr("y",d=>d.y - rScale(d.token_count) - 6);
      });

      // store refs for filtering
      window._dagRefs = { nodeSel, linkSel, labelSel, nodeData, linkData, nodeMap };
    }

    /* ====== TREE VIEW ====== */
    function renderTree(){
      gLinks.selectAll("*").remove();
      gNodes.selectAll("*").remove();
      gLabels.selectAll("*").remove();
      if(sim) sim.stop();

      const root = d3.hierarchy(TREE);
      const treeW = Math.max(W - 200, 600);
      const treeH = Math.max(root.descendants().length * 22, H - 100);
      const layout = d3.tree().size([treeH, treeW - 200]);
      layout(root);

      // links
      gLinks.selectAll("path").data(root.links()).enter().append("path")
        .attr("class","tree-link")
        .attr("d", d3.linkHorizontal().x(d=>d.y+100).y(d=>d.x));

      // nodes
      const nodeSel = gNodes.selectAll("g.tnode").data(root.descendants()).enter().append("g")
        .attr("class","tnode")
        .attr("transform", d => `translate(${d.y+100},${d.x})`);

      nodeSel.append("circle")
        .attr("r", d => d.data.type==="leaf" ? 5 : 8)
        .attr("fill", d => lvlColor(d.data.level||0))
        .attr("stroke","#0f172a").attr("stroke-width",1.5);

      // overlay glow
      nodeSel.filter(d => overlaySet.has(d.data.id)).append("circle")
        .attr("r",12).attr("fill","none").attr("stroke","#fbbf24").attr("stroke-width",2.5).attr("stroke-dasharray","4,2");

      // labels
      nodeSel.append("text")
        .attr("class","node-label")
        .attr("dx", d => d.children ? -12 : 12)
        .attr("dy","0.35em")
        .attr("text-anchor", d => d.children ? "end" : "start")
        .text(d => (d.data.name||"").slice(0,50) + ((d.data.name||"").length>50?"...":""));

      nodeSel.style("cursor","pointer")
        .on("mouseover",(e,d) => showDetail(d.data))
        .on("mouseout", clearDetail);

      // fit
      svg.call(zoom.transform, d3.zoomIdentity.translate(50,H/2 - treeH/2).scale(0.85));
    }

    /* ====== DETAIL PANEL ====== */
    const detEl = document.getElementById("details");
    function showDetail(d){
      const score = overlayScores[d.id];
      detEl.innerHTML = `
        <div class="row"><strong style="font-size:14px">${d.name||d.id}</strong></div>
        <div class="row"><strong>ID:</strong> <span class="mono">${d.id}</span></div>
        <div class="row"><strong>Level:</strong> ${d.level} &nbsp; <strong>Type:</strong> ${d.type}</div>
        <div class="row"><strong>Tokens:</strong> ${d.token_count}</div>
        ${score !== undefined ? `<div class="row"><strong>Retrieval score:</strong> ${score.toFixed(4)}</div>` : ""}
        ${d.full_text ? `<div class="row" style="margin-top:8px;max-height:140px;overflow:auto"><span class="mono">${d.full_text}</span></div>` : ""}
      `;
    }
    function clearDetail(){ detEl.innerHTML = "Hover over a node for details."; }

    /* ====== STATS PANEL ====== */
    const statEl = document.getElementById("stats");
    function updateStats(){
      const nLeaves = DAG.nodes.filter(n=>n.type==="leaf").length;
      const nSummaries = DAG.nodes.filter(n=>n.type==="summary").length;
      statEl.innerHTML = `
        <div class="row"><strong>Total nodes:</strong> ${DAG.nodes.length}</div>
        <div class="row"><strong>Leaves:</strong> ${nLeaves}</div>
        <div class="row"><strong>Summaries:</strong> ${nSummaries}</div>
        <div class="row"><strong>Edges:</strong> ${DAG.links.length}</div>
        <div class="row"><strong>Levels:</strong> ${MAX_LVL+1}</div>
        ${overlaySet.size ? `<div class="row"><strong>Retrieved:</strong> ${overlaySet.size} nodes</div>` : ""}
      `;
    }
    updateStats();

    /* ====== VIEW SWITCHING ====== */
    document.getElementById("btnDAG").addEventListener("click", ()=>{
      currentView="dag";
      document.getElementById("btnDAG").classList.add("active");
      document.getElementById("btnTree").classList.remove("active");
      renderDAG();
    });
    document.getElementById("btnTree").addEventListener("click", ()=>{
      currentView="tree";
      document.getElementById("btnTree").classList.add("active");
      document.getElementById("btnDAG").classList.remove("active");
      renderTree();
    });

    /* ====== SEARCH FILTER ====== */
    document.getElementById("searchInput").addEventListener("input", e => {
      const q = e.target.value.trim().toLowerCase();
      if(currentView !== "dag" || !window._dagRefs) return;
      const {nodeSel, linkSel, labelSel, nodeData, linkData, nodeMap} = window._dagRefs;
      if(!q){
        nodeSel.attr("opacity",1); linkSel.attr("opacity",d=>0.15+d.weight*0.7); labelSel.attr("opacity",1);
        return;
      }
      const match = new Set();
      nodeData.forEach(d => { if(d.name.toLowerCase().includes(q)) match.add(d.id); });
      nodeSel.attr("opacity", d => match.has(d.id)?1:0.08);
      labelSel.attr("opacity", d => match.has(d.id)?1:0.05);
      linkSel.attr("opacity", d => {
        const sid = typeof d.source==="object"?d.source.id:d.source;
        const tid = typeof d.target==="object"?d.target.id:d.target;
        return (match.has(sid)||match.has(tid)) ? 0.6 : 0.03;
      });
    });

    /* ====== WEIGHT SLIDER ====== */
    document.getElementById("weightSlider").addEventListener("input", e => {
      const thresh = parseFloat(e.target.value);
      document.getElementById("weightVal").textContent = thresh.toFixed(2);
      if(currentView !== "dag" || !window._dagRefs) return;
      const {linkSel} = window._dagRefs;
      linkSel.attr("display", d => d.weight >= thresh ? null : "none");
    });

    /* ====== LEVEL FILTER ====== */
    document.getElementById("levelFilter").addEventListener("change", e => {
      const val = e.target.value;
      if(currentView !== "dag" || !window._dagRefs) return;
      const {nodeSel, labelSel} = window._dagRefs;
      if(val === "all"){
        nodeSel.attr("opacity",1); labelSel.attr("opacity",1);
      } else {
        const lvl = parseInt(val);
        nodeSel.attr("opacity", d => d.level===lvl?1:0.1);
        labelSel.attr("opacity", d => d.level===lvl?1:0.05);
      }
    });

    /* ====== INITIAL RENDER ====== */
    renderDAG();

  })();
  </script>
</body>
</html>
